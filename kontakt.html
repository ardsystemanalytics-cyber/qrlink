<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kontakt – QR LINK</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="logo" href="index.html" aria-label="ARDSYSTÉM – domov"><img src="img/logo-ardsystem.png" alt="ARDSYSTÉM, s. r. o."></a>
    <button class="nav-toggle" aria-label="Otvoriť menu">MENU</button>
    <nav class="nav">
      <a href="index.html">Mapa</a>
      <a href="index.html#miesta">Miesta</a>
      <a href="kontakt.html" class="active">Kontakt</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <section class="cat-hero">
    <div class="cat-hero-text">
      <h1>Neváhajte nás kedykoľvek kontaktovať</h1>
      <p>Radi pripravíme QR sprievodcu aj pre vaše mesto, pamiatku alebo náučný chodník.</p>
    </div>
  </section>

  <section class="contact-grid">
    <div class="contact-card">
      <div class="contact-card-head">
        <span class="contact-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21l18 0"/><path d="M9 8l1 0"/><path d="M9 12l1 0"/><path d="M9 16l1 0"/><path d="M14 8l1 0"/><path d="M14 12l1 0"/><path d="M14 16l1 0"/><path d="M5 21v-16a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v16"/>
          </svg>
        </span>
        <h3>Kontaktné údaje</h3>
      </div>
      <div id="contactData"></div>
      <hr class="contact-divider">
      <div class="social-links" id="contactSocial"></div>
    </div>

    <div class="contact-card">
      <div class="contact-card-head">
        <span class="contact-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 9h8"/><path d="M8 13h6"/><path d="M9 18h-3a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-3l-3 3l-3 -3"/>
          </svg>
        </span>
        <h3>Napíšte nám</h3>
      </div>
      <form id="contactForm" class="contact-form">
        <div class="form-row">
          <input type="text" name="meno" placeholder="Meno a priezvisko *" required>
          <input type="email" name="email" placeholder="E-mail *" required>
        </div>
        <textarea name="sprava" placeholder="Vaša správa *" required rows="5"></textarea>
        <label class="fake-captcha">
          <input type="checkbox" required>
          <span>Nie som robot</span>
          <span class="captcha-badge">reCAPTCHA</span>
        </label>
        <button type="submit" class="btn contact-submit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
            <path d="M10 14l11 -11"/><path d="M21 3l-6.5 18a.55 .55 0 0 1 -1 0l-3.5 -7l-7 -3.5a.55 .55 0 0 1 0 -1l18 -6.5"/>
          </svg>
          Odoslať správu
        </button>
        <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
      </form>
    </div>
  </section>

  <section class="cat-features" id="contactFeatures"></section>
</main>

<footer class="site-footer">
  <div class="footer-bottom wrap">
    <a class="footer-logo" href="https://www.ardsystem.sk" target="_blank" rel="noopener" aria-label="ARDSYSTÉM, s. r. o.">
      <img src="img/logo-ardsystem.png" alt="ARDSYSTÉM, s. r. o." style="height:42px;width:auto">
    </a>
    <span>© ARDSYSTÉM, s.r.o. – všetky práva vyhradené</span>
    <span>QR LINK – digitálny sprievodca</span>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
