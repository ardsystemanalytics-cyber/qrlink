<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zastavenie – QR LINK</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="logo" href="index.html" aria-label="QR LINK – domov">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2B3A9B" stroke-width="2">
        <path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h3v3h-3zM19 14h2v2h-2zM14 19h2v2h-2zM19 19h2v2h-2z"/>
      </svg>
      QR<b>LINK</b>
    </a>
    <button class="nav-toggle" aria-label="Otvoriť menu">MENU</button>
    <nav class="nav">
      <a href="index.html">Mapa</a>
      <a href="index.html#miesta">Miesta</a>
      <a href="kontakt.html">Kontakt</a>
    </nav>
  </div>
</header>

<main class="wrap detail" id="detailRoot">
  <nav class="crumbs" aria-label="Ste tu">
    <a href="index.html">Domov</a><span class="sep">›</span>
    <span id="crumbKat">…</span><span class="sep">›</span>
    <a href="#" id="crumbMiesto">…</a><span class="sep">›</span>
    <span class="here" id="crumbHere">…</span>
  </nav>

  <div class="detail-cover" id="dCover"></div>

  <h1 id="dTitle">…</h1>
  <p class="sub" id="dSub"></p>

  <div id="playerHost"></div>

  <div class="text" id="dText"></div>

  <div id="galleryHost"></div>

  <div class="gps-box" id="gpsHost">
    <span class="gps-label" id="gpsLabel">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 21s-7-5.5-7-11a7 7 0 1 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/>
      </svg>
      Kde QR kód nájdete
    </span>
    <iframe id="gpsFrame" src="" loading="lazy" title="Mapa – poloha QR kódu"
      referrerpolicy="no-referrer-when-downgrade" allowfullscreen></iframe>
  </div>

  <div class="meta-row">
    <span class="counter">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 4a3 3 0 1 1-2 0M7 21v-5l2-3 1-4h4l1 4 2 3v5"/>
      </svg>
      <span id="visitCount">–</span>
    </span>
    <a class="btn" id="allStops" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 4a3 3 0 1 1-2 0M8 21l2-6 3-2 1-4M14 21l-1-5"/>
      </svg>
      Všetky zastavenia
    </a>
  </div>
</main>

<footer class="site-footer">
  <div class="wrap">
    <a class="footer-logo" href="https://www.ardsystem.sk" target="_blank" rel="noopener" aria-label="ARDSYSTÉM, s. r. o.">
      <img src="img/logo-ardsystem.png" alt="ARDSYSTÉM, s. r. o."></a>
    <span>© ARDSYSTÉM, s. r. o. – všetky práva vyhradené</span>
    <span>QR LINK · digitálny sprievodca</span>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
